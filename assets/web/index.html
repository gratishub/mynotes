<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的日记 — 局域网同步</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #F9FAFB;
      overflow: hidden;
      height: 100vh;
    }

    /* 侧边栏毛玻璃 */
    .glass-sidebar {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* 状态指示器 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online { background: #22C55E; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
    .status-dot.offline { background: #EF4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }

    /* 卡片悬浮效果 */
    .post-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
    }

    /* 编辑器区域 */
    .editor-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100%;
    }
    .editor-textarea {
      resize: none;
      outline: none;
      border: none;
      padding: 24px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 15px;
      line-height: 1.8;
      background: white;
    }
    .editor-preview {
      padding: 24px;
      overflow-y: auto;
      background: #FAFAFA;
      border-left: 1px solid #F0F0F0;
    }

    /* 预览区 markdown 样式 */
    .preview-content h1 { font-size: 1.5rem; font-weight: 700; margin: 16px 0 8px; color: #2A2A2A; }
    .preview-content h2 { font-size: 1.25rem; font-weight: 600; margin: 14px 0 6px; color: #2A2A2A; }
    .preview-content h3 { font-size: 1.1rem; font-weight: 600; margin: 12px 0 4px; color: #2A2A2A; }
    .preview-content p { margin: 8px 0; line-height: 1.8; color: #3A3A3A; }
    .preview-content blockquote {
      border-left: 3px solid #FF9472;
      padding-left: 12px;
      color: #888;
      font-style: italic;
      margin: 12px 0;
    }
    .preview-content code {
      background: #F3F4F6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .preview-content pre {
      background: #F3F4F6;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .preview-content pre code { background: none; padding: 0; }
    .preview-content ul, .preview-content ol { margin: 8px 0; padding-left: 24px; }
    .preview-content li { margin: 4px 0; line-height: 1.7; }
    .preview-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; }
    .markdown-body img { max-width: 100%; height: auto; border-radius: 8px; }
    .preview-content a { color: #FF9472; text-decoration: none; }
    .preview-content strong { font-weight: 600; }
    .preview-content hr { border: none; border-top: 1px solid #E5E7EB; margin: 16px 0; }

    /* 标签 Chip */
    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      background: rgba(255, 148, 114, 0.15);
      color: #FF9472;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    /* 日期筛选 */
    .quick-date-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      background: white;
      color: #6B7280;
      transition: all 0.15s;
    }
    .quick-date-btn:hover {
      border-color: #FF9472;
      color: #FF9472;
    }
    .quick-date-btn.active {
      background: #FF9472;
      border-color: #FF9472;
      color: white;
    }
    .date-input {
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
      color: #3A3A3A;
      outline: none;
      font-family: 'Noto Sans SC', sans-serif;
      background: white;
    }
    .date-input:focus {
      border-color: #FF9472;
    }

    /* 抽屉动画 */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.active { opacity: 1; pointer-events: all; }

    .drawer-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 90vw;
      max-width: 900px;
      background: white;
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.12);
    }
    .drawer-panel.active { transform: translateX(0); }

    /* 拖放区域 */
    .drop-zone {
      border: 2px dashed transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.dragover {
      border-color: #FF9472;
      background: rgba(255, 148, 114, 0.05);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 24px;
      background: #2A2A2A;
      color: #fff;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 图片预览网格 */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 12px;
    }
    .image-grid img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }

    /* 响应式：小窗口隐藏侧边栏 */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0 !important; }
    }

    /* 登录遮罩 */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: #F9FAFB;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      width: 360px;
      max-width: 90vw;
    }

    /* 标签下拉 */
    .tag-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      max-height: 180px;
      overflow-y: auto;
      z-index: 60;
      display: none;
    }
    .tag-dropdown.show { display: block; }
    .tag-dropdown-item {
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #3A3A3A;
    }
    .tag-dropdown-item:hover,
    .tag-dropdown-item.active {
      background: rgba(255, 148, 114, 0.1);
      color: #FF9472;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  </style>
</head>
<body class="flex h-screen">

  <!-- ========== 登录遮罩 ========== -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card text-center">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#FF9472] to-[#FFB194] flex items-center justify-center mx-auto mb-5 shadow-sm">
        <i class="ph ph-lock-key text-white text-2xl"></i>
      </div>
      <h2 class="text-lg font-semibold text-[#3A3A3A] mb-1">连接手机</h2>
      <p class="text-xs text-gray-400 mb-5">请输入手机端显示的访问密钥</p>
      <input id="tokenInput" type="text" class="w-full text-center text-sm font-mono tracking-widest border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-[#FF9472] transition-colors" placeholder="8位密钥" maxlength="8" />
      <div id="loginError" class="hidden text-xs text-red-400 mt-2">密钥错误，请重新输入</div>
      <button onclick="doLogin()" id="loginBtn" class="w-full mt-4 bg-[#FF9472] hover:bg-[#FF8058] active:scale-95 text-white text-sm font-medium py-2.5 rounded-xl transition-all duration-200 cursor-pointer shadow-sm">
        连接
      </button>
    </div>
  </div>

  <!-- ========== 左侧边栏 ========== -->
  <aside class="sidebar glass-sidebar w-64 flex-shrink-0 flex flex-col border-r border-gray-100 z-30">
    <!-- Logo 区 -->
    <div class="px-5 py-5 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[#FF9472] to-[#FFB194] flex items-center justify-center shadow-sm">
          <i class="ph ph-book-open-text text-white text-lg"></i>
        </div>
        <div>
          <div class="text-sm font-semibold text-[#3A3A3A]">我的日记</div>
          <div class="text-xs text-gray-400">局域网同步</div>
        </div>
      </div>
    </div>

    <!-- 状态指示器 -->
    <div class="px-5 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <span id="statusDot" class="status-dot offline"></span>
        <span id="statusText" class="text-xs text-gray-500">检测中...</span>
      </div>
      <div id="ipDisplay" class="mt-2 text-xs text-gray-400 font-mono"></div>
    </div>

    <!-- 写日记按钮 -->
    <div class="px-5 py-4">
      <button id="newPostBtn" onclick="openEditor()" class="w-full flex items-center justify-center gap-2 bg-[#FF9472] hover:bg-[#FF8058] active:scale-95 text-white text-sm font-medium py-2.5 px-4 rounded-xl transition-all duration-200 shadow-sm cursor-pointer">
        <i class="ph ph-pencil-simple"></i>
        写新日记
      </button>
    </div>

    <!-- 导航列表 -->
    <nav class="flex-1 px-3 py-2 overflow-y-auto">
      <div class="text-xs font-medium text-gray-400 uppercase tracking-wider px-2 py-2">日记</div>
      <a href="#" onclick="resetFilter(); return false;" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[#3A3A3A] hover:bg-gray-50 transition-colors cursor-pointer">
        <i class="ph ph-house"></i>
        全部日记
      </a>
      <div id="tagFilterList" class="mt-2"></div>

      <!-- 日期筛选 -->
      <div class="mt-4 px-2">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-wider py-2">按日期</div>
        <!-- 快捷按钮 -->
        <div class="flex flex-wrap gap-1.5 mt-1">
          <button onclick="setQuickDate('today')" class="quick-date-btn">今天</button>
          <button onclick="setQuickDate('week')" class="quick-date-btn">本周</button>
          <button onclick="setQuickDate('month')" class="quick-date-btn">本月</button>
          <button onclick="setQuickDate('year')" class="quick-date-btn">今年</button>
        </div>
        <!-- 自定义范围 -->
        <div class="mt-3 flex items-center gap-1.5">
          <input type="date" id="dateStart" class="date-input flex-1" onchange="onDateFilterChange()" />
          <span class="text-gray-300 text-xs">~</span>
          <input type="date" id="dateEnd" class="date-input flex-1" onchange="onDateFilterChange()" />
        </div>
        <!-- 当前筛选状态 -->
        <div id="dateFilterStatus" class="hidden mt-2 flex items-center justify-between">
          <span id="dateFilterLabel" class="text-xs text-[#FF9472]"></span>
          <button onclick="clearDateFilter()" class="text-xs text-gray-400 hover:text-[#FF9472] cursor-pointer">
            <i class="ph ph-x"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- 底部 -->
    <div class="px-5 py-4 border-t border-gray-100">
      <div class="text-xs text-gray-400 text-center">手机端局域网地址</div>
      <div id="serverAddr" class="text-xs text-center mt-1 font-mono text-[#FF9472]"></div>
    </div>
  </aside>

  <!-- ========== 主内容区 ========== -->
  <main class="main-content flex-1 flex flex-col overflow-hidden">
    <!-- 顶栏 -->
    <header class="bg-white/70 backdrop-blur-md border-b border-gray-100 px-6 h-14 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-4">
        <h2 id="feedTitle" class="text-base font-semibold text-[#3A3A3A]">全部日记</h2>
        <span id="postCount" class="text-xs text-gray-400"></span>
      </div>
      <button id="refreshBtn" class="text-sm text-gray-400 hover:text-[#FF9472] transition-colors cursor-pointer flex items-center gap-1">
        <i class="ph ph-arrows-clockwise"></i>
        刷新
      </button>
    </header>

    <!-- 日记流 -->
    <div id="feedContainer" class="flex-1 overflow-y-auto px-6 py-6">
      <div id="loading" class="flex justify-center items-center py-20">
        <div class="w-6 h-6 border-2 border-[#FF9472] border-t-transparent rounded-full animate-spin"></div>
        <span class="ml-3 text-gray-400 text-sm">加载中...</span>
      </div>
      <div id="error" class="hidden text-center py-20">
        <i class="ph ph-wifi-x text-4xl text-gray-300"></i>
        <p class="text-gray-400 text-sm mt-3">加载失败，请确认手机和电脑在同一局域网</p>
        <button onclick="fetchPosts()" class="mt-3 text-sm text-[#FF9472] hover:underline cursor-pointer">重试</button>
      </div>
      <div id="empty" class="hidden text-center py-20">
        <i class="ph ph-note-blank text-4xl text-gray-200"></i>
        <p class="text-gray-400 text-sm mt-3">还没有日记</p>
        <p class="text-gray-300 text-xs mt-1">点击左侧"写新日记"开始记录</p>
      </div>
      <div id="postGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 pb-24"></div>
    </div>
  </main>

  <!-- ========== 编辑抽屉 ========== -->
  <div id="drawerOverlay" class="drawer-overlay" onclick="closeEditor()"></div>
  <div id="drawerPanel" class="drawer-panel">
    <!-- 抽屉顶栏 -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
      <div class="flex items-center gap-3">
        <span id="editorTitle" class="text-sm font-medium text-[#3A3A3A]">写日记</span>
        <span id="editorUuid" class="hidden text-xs text-gray-400 font-mono"></span>
      </div>
      <div class="flex items-center gap-3">
        <!-- 标签输入 -->
        <div class="relative flex items-center gap-2">
          <i class="ph ph-tag text-gray-400 text-sm"></i>
          <input id="tagInput" class="text-sm border-none outline-none bg-transparent text-gray-500 placeholder:text-gray-300 w-32" placeholder="标签，回车确认" autocomplete="off" />
          <div id="tagDropdown" class="tag-dropdown"></div>
        </div>
        <div id="tagList" class="flex flex-wrap gap-1 max-w-48"></div>
        <button onclick="closeEditor()" class="text-gray-400 hover:text-gray-600 text-xl leading-none cursor-pointer">
          <i class="ph ph-x"></i>
        </button>
      </div>
    </div>

    <!-- 编辑器主体 -->
    <div class="editor-split flex-1 overflow-hidden">
      <!-- 左：文本编辑区 -->
      <div class="drop-zone relative" id="dropZone"
        ondragover="event.preventDefault(); this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="handleDrop(event)">
        <textarea id="editorTextarea" class="editor-textarea w-full h-full"
          placeholder="此刻的想法或发生的故事...

支持拖拽图片到此处上传
快捷键：Ctrl+S 保存"
          onkeydown="handleEditorKeydown(event)"></textarea>
        <div id="uploadProgress" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center">
          <div class="text-sm text-[#FF9472]">正在上传图片...</div>
        </div>
      </div>
      <!-- 右：实时预览区 -->
      <div class="editor-preview">
        <div id="previewContent" class="preview-content text-sm"></div>
      </div>
    </div>

    <!-- 抽屉底栏 -->
    <div class="flex items-center justify-between px-6 py-4 border-t border-gray-100 flex-shrink-0 bg-white">
      <div class="text-xs text-gray-400">
        <kbd class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">Ctrl+S</kbd> 保存
        &nbsp;·&nbsp;
        <kbd class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">Ctrl+Enter</kbd> 发布
      </div>
      <div class="flex gap-3">
        <button id="cancelBtn" onclick="closeEditor()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 cursor-pointer">取消</button>
        <button id="saveBtn" onclick="savePost()" class="bg-[#FF9472] hover:bg-[#FF8058] active:scale-95 text-white text-sm font-medium px-6 py-2 rounded-xl transition-all duration-200 cursor-pointer shadow-sm">
          发布
        </button>
      </div>
    </div>
  </div>

  <!-- ========== 图片查看弹窗 ========== -->
  <div id="imageModal" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4" onclick="closeImageModal()">
    <img id="imageModalImg" src="" class="max-w-full max-h-full object-contain rounded-lg" onclick="event.stopPropagation()" />
  </div>

  <!-- ========== Toast ========== -->
  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = '';
    let API_TOKEN = localStorage.getItem('mynotes_token') || '';

    // 通用 fetch 封装，自动携带鉴权头
    function apiFetch(url, options = {}) {
      const headers = options.headers || {};
      if (API_TOKEN) {
        headers['Authorization'] = 'Bearer ' + API_TOKEN;
      }
      return fetch(url, { ...options, headers });
    }

    // ========== 状态管理 ==========
    let allPosts = [];
    let allTags = []; // 服务器上的所有标签
    let currentFilter = null; // null = 全部，string = 标签名
    let dateStart = ''; // 日期筛选起始
    let dateEnd = ''; // 日期筛选结束
    let editingPost = null; // null = 新建，object = 编辑
    let currentTags = []; // 当前编辑的标签列表
    let uploadQueue = [];
    let tagDropdownIndex = -1; // 标签下拉选中索引

    // ========== Toast ==========
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ========== 心跳检测 ==========
    async function checkStatus() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      try {
        const res = await apiFetch(`${API_BASE}/api/status`);
        if (res.ok) {
          const data = await res.json();
          dot.className = 'status-dot online';
          text.textContent = '🟢 在线 · ' + data.device;
        } else {
          throw new Error();
        }
      } catch {
        dot.className = 'status-dot offline';
        text.textContent = '🔴 离线';
      }
    }

    // ========== 获取日记列表 ==========
    async function fetchPosts() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const empty = document.getElementById('empty');
      const grid = document.getElementById('postGrid');

      loading.classList.remove('hidden');
      error.classList.add('hidden');
      empty.classList.add('hidden');
      grid.classList.add('hidden');

      try {
        // 构建查询参数
        const params = new URLSearchParams();
        if (currentFilter) params.set('tag', currentFilter);
        if (dateStart) params.set('startDate', dateStart);
        if (dateEnd) params.set('endDate', dateEnd);
        const qs = params.toString();
        const url = `${API_BASE}/api/posts${qs ? '?' + qs : ''}`;

        const res = await apiFetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allPosts = await res.json();

        loading.classList.add('hidden');

        let posts = allPosts;

        if (posts.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        grid.classList.remove('hidden');
        grid.innerHTML = posts.map(p => renderCard(p)).join('');

        document.getElementById('postCount').textContent = posts.length + ' 篇';
        updateTagFilter();
      } catch (e) {
        loading.classList.add('hidden');
        error.classList.remove('hidden');
        console.error(e);
      }
    }

    // ========== 标签筛选更新 ==========
    function updateTagFilter() {
      const container = document.getElementById('tagFilterList');
      const tagMap = {};
      for (const p of allPosts) {
        for (const t of (p.tags || [])) {
          tagMap[t] = (tagMap[t] || 0) + 1;
        }
      }
      const tags = Object.keys(tagMap).sort((a, b) => tagMap[b] - tagMap[a]);

      if (tags.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <div class="text-xs font-medium text-gray-400 uppercase tracking-wider px-2 py-2">标签</div>
        ${tags.map(tag => `
          <a href="#" onclick="setTagFilter('${tag}'); return false;"
             class="flex items-center justify-between px-3 py-2 rounded-lg text-sm transition-colors cursor-pointer ${currentFilter === tag ? 'bg-[#FF9472]/10 text-[#FF9472]' : 'text-[#3A3A3A] hover:bg-gray-50'}">
            <span class="flex items-center gap-2">
              <i class="ph ph-tag"></i>
              ${tag}
            </span>
            <span class="text-xs text-gray-400">${tagMap[tag]}</span>
          </a>
        `).join('')}
      `;
    }

    function setTagFilter(tag) {
      currentFilter = currentFilter === tag ? null : tag;
      document.getElementById('feedTitle').textContent = tag || '全部日记';
      fetchPosts();
    }

    function resetFilter() {
      currentFilter = null;
      document.getElementById('feedTitle').textContent = '全部日记';
      fetchPosts();
    }

    // ========== 日期筛选 ==========
    let activeQuickDate = null;

    function setQuickDate(type) {
      // 取消已选
      if (activeQuickDate === type) {
        clearDateFilter();
        return;
      }
      const now = new Date();
      const fmt = d => d.toISOString().slice(0, 10);
      switch (type) {
        case 'today':
          dateStart = fmt(now);
          dateEnd = fmt(now);
          break;
        case 'week': {
          const day = now.getDay() || 7;
          const mon = new Date(now);
          mon.setDate(now.getDate() - day + 1);
          dateStart = fmt(mon);
          dateEnd = fmt(now);
          break;
        }
        case 'month':
          dateStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
          dateEnd = fmt(now);
          break;
        case 'year':
          dateStart = `${now.getFullYear()}-01-01`;
          dateEnd = fmt(now);
          break;
      }
      activeQuickDate = type;
      document.getElementById('dateStart').value = dateStart;
      document.getElementById('dateEnd').value = dateEnd;
      updateQuickDateBtns();
      updateDateFilterLabel();
      fetchPosts();
    }

    function onDateFilterChange() {
      dateStart = document.getElementById('dateStart').value;
      dateEnd = document.getElementById('dateEnd').value;
      activeQuickDate = null;
      updateQuickDateBtns();
      if (dateStart || dateEnd) {
        updateDateFilterLabel();
      } else {
        document.getElementById('dateFilterStatus').classList.add('hidden');
        if (!currentFilter) {
          document.getElementById('feedTitle').textContent = '全部日记';
        }
      }
      fetchPosts();
    }

    function clearDateFilter() {
      dateStart = '';
      dateEnd = '';
      activeQuickDate = null;
      document.getElementById('dateStart').value = '';
      document.getElementById('dateEnd').value = '';
      document.getElementById('dateFilterStatus').classList.add('hidden');
      updateQuickDateBtns();
      if (!currentFilter) {
        document.getElementById('feedTitle').textContent = '全部日记';
      }
      fetchPosts();
    }

    function updateQuickDateBtns() {
      document.querySelectorAll('.quick-date-btn').forEach(btn => {
        const type = btn.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
        btn.classList.toggle('active', type === activeQuickDate);
      });
    }

    function updateDateFilterLabel() {
      const status = document.getElementById('dateFilterStatus');
      const label = document.getElementById('dateFilterLabel');
      status.classList.remove('hidden');
      if (dateStart && dateEnd && dateStart === dateEnd) {
        label.textContent = dateStart;
      } else if (dateStart && dateEnd) {
        label.textContent = `${dateStart} ~ ${dateEnd}`;
      } else if (dateStart) {
        label.textContent = `${dateStart} 起`;
      } else {
        label.textContent = `至 ${dateEnd}`;
      }
      document.getElementById('feedTitle').textContent = label.textContent;
    }

    // ========== 渲染日记卡片 ==========
    function renderCard(post) {
      const preview = post.content
        ? (post.content.length > 160 ? post.content.substring(0, 160) + '...' : post.content)
        : '';
      const images = post.images || [];
      const tags = post.tags || [];

      return `
        <div class="post-card bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm"
             onclick="openEditor('${post.uuid}')">
          ${images.length > 0 ? `
          <div class="image-grid">
            ${images.slice(0, 3).map(img => `
              <img src="${img.url}" alt="image" class="w-full h-20 object-cover rounded-lg cursor-pointer"
                   onclick="event.stopPropagation(); openImage('${img.url}')"
                   onerror="this.style.display='none'" />
            `).join('')}
            ${images.length > 3 ? `<div class="flex items-center justify-center h-20 bg-gray-50 rounded-lg text-xs text-gray-400">+${images.length - 3}</div>` : ''}
          </div>` : ''}
          <div class="p-4">
            ${tags.length > 0 ? `
              <div class="flex flex-wrap gap-1 mb-2">
                ${tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
              </div>
            ` : ''}
            <p class="text-xs text-gray-400 mb-2">${formatDate(post.updatedAt)}</p>
            <p class="text-sm text-[#3A3A3A] leading-relaxed line-clamp-4 whitespace-pre-wrap">${escapeHtml(preview)}</p>
          </div>
        </div>
      `;
    }

    function formatDate(ms) {
      const d = new Date(ms);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}年${m}月${day}日 ${hh}:${mm}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 编辑器 ==========
    function openEditor(uuid) {
      const textarea = document.getElementById('editorTextarea');
      const title = document.getElementById('editorTitle');
      const uuidEl = document.getElementById('editorUuid');
      const tagList = document.getElementById('tagList');
      const tagInput = document.getElementById('tagInput');

      if (uuid) {
        // 编辑已有日记
        editingPost = allPosts.find(p => p.uuid === uuid);
        if (!editingPost) return;
        textarea.value = editingPost.content || '';
        currentTags = [...(editingPost.tags || [])];
        title.textContent = '编辑日记';
        uuidEl.textContent = uuid;
        uuidEl.classList.remove('hidden');
      } else {
        // 新建
        editingPost = null;
        textarea.value = '';
        currentTags = [];
        title.textContent = '写日记';
        uuidEl.classList.add('hidden');
      }

      // 渲染已有标签
      renderEditorTags();
      tagInput.value = '';

      // 打开抽屉
      document.getElementById('drawerOverlay').classList.add('active');
      document.getElementById('drawerPanel').classList.add('active');

      updatePreview();
      textarea.focus();
    }

    function closeEditor() {
      document.getElementById('drawerOverlay').classList.remove('active');
      document.getElementById('drawerPanel').classList.remove('active');
      editingPost = null;
      currentTags = [];
    }

    function renderEditorTags() {
      const tagList = document.getElementById('tagList');
      tagList.innerHTML = currentTags.map(tag => `
        <span class="tag-chip cursor-pointer" onclick="removeTag('${tag}')">
          ${tag} <i class="ph ph-x text-xs ml-1"></i>
        </span>
      `).join('');
    }

    function removeTag(tag) {
      currentTags = currentTags.filter(t => t !== tag);
      renderEditorTags();
    }

    // 标签输入 + 自动补全
    const tagInput = document.getElementById('tagInput');
    const tagDropdown = document.getElementById('tagDropdown');

    tagInput.addEventListener('input', (e) => {
      const val = e.target.value.trim();
      tagDropdownIndex = -1;
      if (!val) { tagDropdown.classList.remove('show'); return; }
      const matches = allTags.filter(t => t.includes(val) && !currentTags.includes(t)).slice(0, 8);
      if (matches.length === 0) { tagDropdown.classList.remove('show'); return; }
      tagDropdown.innerHTML = matches.map((t, i) =>
        `<div class="tag-dropdown-item" data-tag="${t}" data-index="${i}">${t}</div>`
      ).join('');
      tagDropdown.classList.add('show');
    });

    tagInput.addEventListener('keydown', (e) => {
      const items = tagDropdown.querySelectorAll('.tag-dropdown-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        tagDropdownIndex = Math.min(tagDropdownIndex + 1, items.length - 1);
        updateDropdownHighlight(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        tagDropdownIndex = Math.max(tagDropdownIndex - 1, 0);
        updateDropdownHighlight(items);
      } else if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        // 优先选中下拉项
        let val = '';
        if (tagDropdownIndex >= 0 && items[tagDropdownIndex]) {
          val = items[tagDropdownIndex].dataset.tag;
        } else {
          val = e.target.value.trim().replace(/,$/, '');
        }
        if (val && !currentTags.includes(val)) {
          currentTags.push(val);
          renderEditorTags();
        }
        e.target.value = '';
        tagDropdown.classList.remove('show');
        tagDropdownIndex = -1;
      } else if (e.key === 'Escape') {
        tagDropdown.classList.remove('show');
        tagDropdownIndex = -1;
      }
    });

    tagDropdown.addEventListener('click', (e) => {
      const item = e.target.closest('.tag-dropdown-item');
      if (!item) return;
      const tag = item.dataset.tag;
      if (tag && !currentTags.includes(tag)) {
        currentTags.push(tag);
        renderEditorTags();
      }
      tagInput.value = '';
      tagDropdown.classList.remove('show');
      tagDropdownIndex = -1;
      tagInput.focus();
    });

    // 点击外部关闭下拉
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.relative')) {
        tagDropdown.classList.remove('show');
      }
    });

    function updateDropdownHighlight(items) {
      items.forEach((el, i) => {
        el.classList.toggle('active', i === tagDropdownIndex);
      });
    }

    // 实时预览
    document.getElementById('editorTextarea').addEventListener('input', updatePreview);

    function updatePreview() {
      const content = document.getElementById('editorTextarea').value;
      const preview = document.getElementById('previewContent');
      if (content.trim()) {
        preview.innerHTML = marked.parse(content);
      } else {
        preview.innerHTML = '<p class="text-gray-300 text-sm">预览区</p>';
      }
    }

    // 快捷键
    function handleEditorKeydown(e) {
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        savePost();
      } else if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        savePost();
      }
    }

    // ========== 保存 ==========
    async function savePost() {
      const textarea = document.getElementById('editorTextarea');
      const content = textarea.value.trim();
      if (!content) {
        showToast('内容不能为空');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '发布中...';

      try {
        const body = {
          content,
          tags: currentTags,
        };
        if (editingPost) {
          body.uuid = editingPost.uuid;
        }

        const res = await apiFetch(`${API_BASE}/api/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '保存失败');

        showToast(editingPost ? '已更新' : '已发布');
        closeEditor();
        fetchPosts();
      } catch (e) {
        showToast('发布失败: ' + (e.message || e));
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '发布';
      }
    }

    // ========== 拖放上传 ==========
    async function handleDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('dragover');

      const files = e.dataTransfer.files;
      if (files.length === 0) return;

      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        await uploadImage(file);
      }
    }

    async function uploadImage(file) {
      const progress = document.getElementById('uploadProgress');
      progress.classList.remove('hidden');

      try {
        const formData = new FormData();
        formData.append('file', file);

        const res = await apiFetch(`${API_BASE}/api/upload`, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) throw new Error('Upload failed');
        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        // 在光标处插入 Markdown 图片
        const textarea = document.getElementById('editorTextarea');
        const url = data.url;
        const alt = file.name.replace(/\.[^.]+$/, '');
        const insert = `\n![${alt}](${url})\n`;

        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        textarea.value = text.substring(0, start) + insert + text.substring(end);
        textarea.selectionStart = textarea.selectionEnd = start + insert.length;
        textarea.focus();

        updatePreview();
        showToast('图片上传成功');
      } catch (e) {
        showToast('上传失败: ' + (e.message || e));
      } finally {
        progress.classList.add('hidden');
      }
    }

    // ========== 图片查看 ==========
    function openImage(url) {
      document.getElementById('imageModalImg').src = url;
      document.getElementById('imageModal').classList.remove('hidden');
    }

    function closeImageModal() {
      document.getElementById('imageModal').classList.add('hidden');
    }

    // ========== 事件绑定 ==========
    document.getElementById('refreshBtn').addEventListener('click', fetchPosts);
    document.getElementById('newPostBtn').addEventListener('click', () => openEditor());

    // token 输入框回车登录
    document.getElementById('tokenInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    // ========== 登录 ==========
    async function doLogin() {
      const input = document.getElementById('tokenInput');
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const token = input.value.trim();
      if (!token) return;

      btn.disabled = true;
      btn.textContent = '验证中...';
      errorEl.classList.add('hidden');

      try {
        // 用 token 尝试请求，验证是否有效
        const tmpToken = API_TOKEN;
        API_TOKEN = token;
        const res = await apiFetch(`${API_BASE}/api/posts`);
        if (!res.ok) throw new Error('Unauthorized');
        // 验证成功，保存 token
        localStorage.setItem('mynotes_token', token);
        API_TOKEN = token;
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
      } catch {
        API_TOKEN = '';
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '连接';
      }
    }

    // ========== 获取所有标签（用于自动补全） ==========
    async function fetchAllTags() {
      try {
        const res = await apiFetch(`${API_BASE}/api/tags`);
        if (res.ok) allTags = await res.json();
      } catch {}
    }

    // ========== 初始化 ==========
    async function initApp() {
      await Promise.all([checkStatus(), fetchPosts(), fetchAllTags()]);
      setInterval(checkStatus, 3000);
      setInterval(fetchPosts, 30000);
    }

    // 启动：检查 token 是否有效
    (async function boot() {
      if (!API_TOKEN) return; // 无 token，等用户登录
      try {
        const res = await apiFetch(`${API_BASE}/api/posts`);
        if (!res.ok) throw new Error();
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
      } catch {
        // token 无效，清除并要求重新登录
        localStorage.removeItem('mynotes_token');
        API_TOKEN = '';
      }
    })();
  </script>
</body>
</html>
